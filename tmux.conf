# ── General ──────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g history-limit 10000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# ── Tokyo Night colors ────────────────────────────────────────
# bg_dark   = #16161e  bg      = #1a1b26  bg_hl   = #1f2335
# blue      = #7aa2f7  purple  = #bb9af7  green   = #9ece6a
# fg        = #a9b1d6  comment = #565f89

# ── Status bar ───────────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#16161e,fg=#a9b1d6"

# Left: session name with powerline arrow
set -g status-left-length 40
set -g status-left "#[bg=#24283b,fg=#c0caf5,bold] STATIC TEXT #[bg=#7aa2f7,fg=#16161e,bold] #S #[bg=#16161e,fg=#7aa2f7]"

# Right: hostname + time
set -g status-right-length 60
set -g status-right "#[fg=#1f2335,bg=#16161e]#[bg=#1f2335,fg=#a9b1d6] #h #[fg=#7aa2f7,bg=#1f2335]#[bg=#7aa2f7,fg=#16161e,bold] %H:%M "

# Window list
set -g status-justify left
setw -g window-status-format " #I #W "
setw -g window-status-style "fg=#565f89,bg=#16161e"
setw -g window-status-current-format "#[fg=#16161e,bg=#7aa2f7,bold] #I #W #[fg=#7aa2f7,bg=#16161e]"
setw -g window-status-current-style "fg=#7aa2f7,bg=#16161e"

# ── Pane borders ─────────────────────────────────────────────
set -g pane-border-style "fg=#2a2b3d"
set -g pane-active-border-style "fg=#7aa2f7"

# ── Messages / command prompt ─────────────────────────────────
set -g message-style "bg=#1f2335,fg=#7aa2f7"
set -g message-command-style "bg=#1f2335,fg=#bb9af7"

# ── Selection (copy mode) ─────────────────────────────────────
setw -g mode-style "bg=#2a2b3d,fg=#7aa2f7"

# ── Keybindings (quality of life) ────────────────────────────
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Move between panes with Alt+arrow (no prefix needed)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D
